; PlatformIO project for the fence voltage monitor node.
; Copy src/config.example.h to src/config.h and edit per node before building.

[env:esp32dev]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.0.4
build_flags =
    ; PubSubClient's default 256-byte packet limit is tight for the
    ; JSON state payload plus topic and MQTT overhead.
    -DMQTT_MAX_PACKET_SIZE=512
